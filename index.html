<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Dark Patato</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #050403;
            --bg-card: rgba(23, 17, 11, 0.85);
            --primary-gold: #d4af37; 
            --secondary-brown: #8b5a2b; 
            --text-main: #ffffff;
        }

        /* Selector de idioma flotante y corregido */
        #google_translate_element {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
        }
        /* Elimina espacios que Google Translate inyecta en el body */
        body { top: 0 !important; }
        .goog-te-banner-frame { display: none !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cormorant Garamond', serif; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 4, 3, 0.75), rgba(5, 4, 3, 0.85)), url('castillo.png');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; 
            position: relative;
        }

        .content-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; }

        .logo-container {
            width: 150px; height: 150px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-card); border: 2px solid var(--primary-gold); border-radius: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); overflow: hidden; animation: pulse 3s infinite;
        }

        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }
            100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        }

        .kingdom-name { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--primary-gold); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; opacity: 0.9; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .alliance-name {
            font-family: 'Cinzel', serif; font-size: 38px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; text-align: center;
            background: linear-gradient(to bottom, #f3e5ab 0%, #d4af37 50%, #8b5a2b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 4px 10px rgba(0,0,0,0.8);
        }

        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; }

        .btn-rect {
            background-color: rgba(23, 17, 11, 0.85); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--text-main);
            padding: 18px 20px; border-radius: 10px; font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        .btn-rect:hover { border-color: var(--primary-gold); background-color: rgba(212, 175, 55, 0.15); transform: translateY(-2px); }
        .btn-rect i { color: var(--primary-gold); font-size: 20px; }

        .btn-discord {
            background-color: rgba(139, 90, 43, 0.9); border: 2px solid var(--secondary-brown); color: white;
            padding: 18px 20px; border-radius: 50px; font-family: 'Cinzel', serif; font-size: 20px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: center;
            gap: 10px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(139, 90, 43, 0.4); transition: all 0.3s ease;
        }

        #sparks-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .spark { position: absolute; bottom: -10px; background-color: #ffaa00; border-radius: 50%; opacity: 0; animation: floatUp linear infinite, flicker ease-in-out infinite alternate; }
        .spark.ember { background-color: #ff4500; box-shadow: 0 0 5px #ff4500; }
        .spark.bright { background-color: #fffacd; box-shadow: 0 0 8px #fffacd; }
        @keyframes floatUp { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; } 100% { transform: translateY(-100vh) translateX(50px) scale(0.5); opacity: 0; } }
        @keyframes flicker { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="sparks-container"></div>
    <div id="google_translate_element"></div>

    <div class="content-wrapper">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo Dark Patato" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display:none; color: var(--primary-gold); font-weight: bold; font-size: 24px;">LOGO</span>
        </div>

        <div class="kingdom-name">Reino 1878</div>
        <h1 class="alliance-name">Dark Patato</h1>

        <div class="menu-container">
            <a href="miembros.html" style="text-decoration:none; display:block;">
                <div class="btn-rect">
                    <span>Miembros</span>
                    <i class="fa-solid fa-users-viewfinder"></i>
                </div>
            </a>
            
            <div class="btn-rect">
                <span>Tutoriales</span>
                <i class="fa-solid fa-book-journal-whills"></i>
            </div>
            
            <a href="eventos.html" style="text-decoration:none; display:block;">
                <div class="btn-rect">
                    <span>Guía de Eventos</span>
                    <i class="fa-solid fa-calendar-days"></i>
                </div>
            </a>

            <a href="https://discord.gg/zWrEyCtAn" target="_blank" style="text-decoration:none; display:block;">
                <div class="btn-discord">
                    <i class="fa-brands fa-discord"></i> Discord
                </div>
            </a>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
          new google.translate.TranslateElement({
            pageLanguage: 'es', 
            includedLanguages: 'es,en,zh-CN,ar', 
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
          }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('sparks-container');
            function createSpark() {
                const spark = document.createElement('div');
                spark.classList.add('spark', Math.random() > 0.5 ? 'ember' : 'bright');
                spark.style.left = `${Math.random() * 100}vw`;
                spark.style.width = `${Math.random() * 4 + 2}px`;
                spark.style.height = spark.style.width;
                const duration = Math.random() * 5 + 3;
                spark.style.animationDuration = `${duration}s, 0.3s`;
                container.appendChild(spark);
                setTimeout(() => { spark.remove(); createSpark(); }, duration * 1000);
            }
            for (let i = 0; i < 60; i++) createSpark();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate" />
    <title>Menú Dark Patato</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #050403;
            --bg-card: rgba(23, 17, 11, 0.85);
            --primary-gold: #d4af37; 
            --secondary-brown: #8b5a2b; 
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cormorant Garamond', serif; }

        /* Fija la pantalla y elimina el scroll */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 4, 3, 0.75), rgba(5, 4, 3, 0.85)), url('castillo.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-wrapper {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .logo-container {
            width: 120px; /* Reducido ligeramente para mejor ajuste en móviles */
            height: 120px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-card);
            border: 2px solid var(--primary-gold);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            animation: pulse 3s infinite;
        }

        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }
            100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        }

        .kingdom-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--primary-gold); letter-spacing: 4px; margin-bottom: 5px; }
        .alliance-name { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 25px; text-align: center; background: linear-gradient(to bottom, #f3e5ab, #d4af37, #8b5a2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .menu-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .btn-rect {
            background-color: rgba(23, 17, 11, 0.85);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text-main);
            padding: 15px 20px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-discord {
            background-color: rgba(139, 90, 43, 0.9);
            border: 2px solid var(--secondary-brown);
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        #sparks-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .spark { position: absolute; background-color: #ffaa00; border-radius: 50%; opacity: 0; animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="sparks-container"></div>

    <div class="content-wrapper">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display:none; color: var(--primary-gold);">LOGO</span>
        </div>

        <div class="kingdom-name">Reino 1878</div>
        <h1 class="alliance-name">Dark Patato</h1>

        <div class="menu-container">
            <a href="miembros.html" style="text-decoration:none;"><div class="btn-rect">Miembros <i class="fa-solid fa-users-viewfinder"></i></div></a>
            <div class="btn-rect">Tutoriales <i class="fa-solid fa-book-journal-whills"></i></div>
            <a href="eventos.html" style="text-decoration:none;"><div class="btn-rect">Guía de Eventos <i class="fa-solid fa-calendar-days"></i></div></a>
            <a href="https://discord.gg/zWrEyCtAn" target="_blank" style="text-decoration:none;"><div class="btn-discord"><i class="fa-brands fa-discord"></i> Discord</div></a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('sparks-container');
            for (let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = Math.random() * 100 + 'vw';
                spark.style.width = (Math.random() * 3 + 1) + 'px';
                spark.style.height = spark.style.width;
                spark.style.animationDuration = (Math.random() * 4 + 4) + 's';
                spark.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(spark);
            }
        });
    </script>
</body>
</html>
